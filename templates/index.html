<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        textarea {
            width: 100%;
            max-width: 700px;
            height: 120px;
            padding: 10px;
        }

        .ascii-art {
            white-space: pre;
            overflow-x: auto;
            font-family: monospace;
            border: 1px solid #ccc;
            padding: 15px;
            background: #f5f5f5;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<h1>Welcome to the ASCII Art Web!</h1>

<form action="/ascii-art" method="post">

<textarea
name="text"
placeholder="Enter the text you want to convert to ASCII art">{{.Text}}</textarea>

<br><br>

<label>
<input type="radio" name="banner" value="shadow" required>
Shadow
</label>

<label>
<input type="radio" name="banner" value="standard">
Standard
</label>

<label>
<input type="radio" name="banner" value="thinkertoy">
Thinkertoy
</label>

<br><br>

<button type="submit">Generate</button>

</form>

{{if .Error}}
<p class="error">{{.Error}}</p>
{{end}}

{{if .Result}}
<hr>

<h2>Result</h2>

<pre class="ascii-art">{{.Result}}</pre>
{{end}}

</body>
</html>
